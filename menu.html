<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Victorious Mega Kitchen — Digital Menu</title>
<meta name="description" content="Digital menu for Victorious Mega Kitchen in Benin City — rice, swallow, soups, extras and protein, ready to explore." />
<meta name="theme-color" content="#2A1240" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
<style>
  /*
    Victorious Mega Kitchen — Digital Menu (QR landing page)
    ----------------------------------------------------------
    Standalone, self-contained page for a printed/table QR code.
    Palette + type system match the VMK app prototype: Baloo 2 for
    display, Inter for body; purple / magenta / teal / lime / coral
    flower-burst palette.

    Menu data lives in the CATEGORIES array in the <script> block
    below. The source menu had no prices, so this is a browsing /
    reference view only. Add a `price` (and `available`) field per
    item whenever that data exists -- e.g. pulled live from the
    WooCommerce Store API -- without touching the render logic.
  */

  :root {
    --purple: #7C3AED;
    --magenta: #E0399D;
    --magenta-deep: #B0227A;
    --teal: #0FA88F;
    --lime: #A0CF1C;
    --coral: #FF6B57;
    --ink: #241B2E;
    --ink-soft: #6B5E75;
    --paper: #FFF8F3;
    --card-bg: #FFFFFF;
    --border: #F0E4EC;
    --font-display: 'Baloo 2', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Hero ---------- */
  .hero {
    position: relative;
    overflow: hidden;
    padding: 30px 20px 26px;
    background: linear-gradient(180deg, #2A1240 0%, #3B1855 100%);
    color: #fff;
  }
  .hero-blob {
    position: absolute;
    inset: -50% -20%;
    background:
      radial-gradient(circle at 15% 20%, var(--coral) 0%, transparent 35%),
      radial-gradient(circle at 85% 15%, var(--teal) 0%, transparent 35%),
      radial-gradient(circle at 75% 85%, var(--magenta) 0%, transparent 40%),
      radial-gradient(circle at 20% 85%, var(--lime) 0%, transparent 35%),
      radial-gradient(circle at 50% 50%, var(--purple) 0%, transparent 45%);
    opacity: 0.55;
    filter: blur(30px);
    pointer-events: none;
  }
  .hero-inner { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; }
  .brand-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .brand-mark { width: 42px; height: 42px; flex-shrink: 0; }
  .eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.75;
    margin: 0 0 2px;
  }
  .hero h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 25px;
    margin: 0;
    line-height: 1.15;
  }
  .hero-sub {
    font-size: 14px;
    line-height: 1.55;
    opacity: 0.92;
    max-width: 460px;
    margin: 10px 0 0;
  }

  /* ---------- Sticky search + category nav ---------- */
  .sticky-zone {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--paper);
    padding-top: 12px;
    box-shadow: 0 8px 18px -12px rgba(36, 27, 46, 0.3);
  }
  .search-wrap {
    position: relative;
    max-width: 640px;
    margin: 0 auto;
    padding: 0 16px 10px;
  }
  .search-wrap input {
    width: 100%;
    padding: 11px 40px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .search-wrap input::placeholder { color: var(--ink-soft); }
  .search-wrap input:focus {
    border-color: var(--magenta);
    box-shadow: 0 0 0 4px rgba(224, 57, 157, 0.15);
  }
  .search-icon {
    position: absolute;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--ink-soft);
    pointer-events: none;
  }
  .clear-btn {
    position: absolute;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    border: none;
    background: var(--border);
    color: var(--ink-soft);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cat-nav-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 16px 12px;
    max-width: 640px;
    margin: 0 auto;
    scrollbar-width: none;
  }
  .cat-nav-scroll::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 13.5px;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.12s ease;
    white-space: nowrap;
  }
  .cat-pill:active { transform: scale(0.95); }
  .cat-pill.is-active {
    background: var(--magenta-deep);
    border-color: var(--magenta-deep);
    color: #fff;
  }
  .pill-count {
    font-size: 11px;
    opacity: 0.75;
    background: rgba(0, 0, 0, 0.08);
    padding: 1px 6px;
    border-radius: 999px;
  }
  .cat-pill.is-active .pill-count { background: rgba(255, 255, 255, 0.25); }

  /* ---------- Menu content ---------- */
  .menu-main { max-width: 640px; margin: 0 auto; padding: 22px 16px 8px; }
  .menu-section { margin-bottom: 34px; scroll-margin-top: 132px; }
  .menu-section.is-hidden { display: none; }
  .section-head {
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--section-color, var(--border));
  }
  .section-head h2 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 21px;
    margin: 0 0 3px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--ink);
  }
  .section-tagline { margin: 0; font-size: 13px; color: var(--ink-soft); }
  .section-count {
    display: inline-block;
    margin-top: 7px;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--ink-soft);
    background: var(--border);
    padding: 2px 9px;
    border-radius: 999px;
  }

  .item-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  @media (min-width: 480px) { .item-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 720px) { .item-grid { grid-template-columns: repeat(4, 1fr); } }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--item-color, var(--purple));
    border-radius: 12px;
    padding: 11px 12px;
    font-size: 13.5px;
    font-weight: 500;
    line-height: 1.3;
    transition: transform 0.12s ease;
    opacity: 0;
    transform: translateY(6px);
    animation: itemIn 0.35s ease forwards;
    animation-delay: var(--delay, 0ms);
  }
  .menu-item:active { transform: scale(0.96); }
  .menu-item.is-hidden { display: none; }
  .item-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--item-color, var(--purple)); flex-shrink: 0; }
  .item-name mark { background: rgba(224, 57, 157, 0.18); color: var(--magenta-deep); border-radius: 3px; padding: 0 1px; }

  @keyframes itemIn { to { opacity: 1; transform: translateY(0); } }

  /* ---------- Empty state ---------- */
  .empty-state { max-width: 640px; margin: 44px auto; text-align: center; padding: 30px 20px; color: var(--ink-soft); }
  .empty-icon { font-size: 30px; margin: 0 0 8px; }
  .text-btn {
    margin-top: 12px;
    border: none;
    background: none;
    color: var(--magenta-deep);
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    text-decoration: underline;
  }

  /* ---------- Back to top ---------- */
  .back-to-top {
    position: fixed;
    right: 18px;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--magenta-deep);
    color: #fff;
    font-size: 18px;
    box-shadow: 0 6px 16px rgba(176, 34, 122, 0.35);
    cursor: pointer;
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 30;
  }
  .back-to-top.is-visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .back-to-top:active { transform: scale(0.92); }

  /* ---------- Footer ---------- */
  .site-footer { text-align: center; padding: 26px 20px 44px; color: var(--ink-soft); font-size: 12.5px; }
  .footer-brand { font-family: var(--font-display); font-weight: 700; color: var(--ink); margin: 0 0 3px; font-size: 15px; }
  .footer-note { margin: 0; }

  /* ---------- Focus states ---------- */
  .cat-pill:focus-visible,
  .back-to-top:focus-visible,
  .clear-btn:focus-visible,
  .text-btn:focus-visible {
    outline: 2px solid var(--magenta-deep);
    outline-offset: 2px;
  }

  /* ---------- Reduced motion ---------- */
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .menu-item { animation: none; opacity: 1; transform: none; }
    .cat-pill, .back-to-top, .menu-item, .search-wrap input { transition: none; }
  }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-blob" aria-hidden="true"></div>
  <div class="hero-inner">
    <div class="brand-row">
      <svg class="brand-mark" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="30" cy="16" r="11" fill="#7C3AED" opacity="0.9"/>
        <circle cx="46" cy="26" r="11" fill="#E0399D" opacity="0.9"/>
        <circle cx="40" cy="44" r="11" fill="#0FA88F" opacity="0.9"/>
        <circle cx="20" cy="44" r="11" fill="#FF6B57" opacity="0.9"/>
        <circle cx="14" cy="26" r="11" fill="#A0CF1C" opacity="0.9"/>
        <circle cx="30" cy="30" r="9" fill="#FFF8F3"/>
      </svg>
      <div>
        <p class="eyebrow">VMK Digital Menu</p>
        <h1>Victorious Mega Kitchen</h1>
      </div>
    </div>
    <p class="hero-sub">Benin City's home-style favourites. Search a dish or tap a category to jump straight there.</p>
  </div>
</header>

<div class="sticky-zone">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
      <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <input id="menu-search" type="search" placeholder="Search dishes…" aria-label="Search menu" autocomplete="off" enterkeyhint="search" />
    <button id="clear-search" class="clear-btn" hidden aria-label="Clear search">✕</button>
  </div>
  <nav class="cat-nav" aria-label="Menu categories">
    <div class="cat-nav-scroll" id="cat-pills"></div>
  </nav>
</div>

<main class="menu-main" id="menu-main"></main>

<div class="empty-state" id="empty-state" hidden>
  <p class="empty-icon">🔍</p>
  <p>No dishes match <span class="query-text"></span></p>
  <button id="clear-search-2" class="text-btn">Clear search</button>
</div>

<noscript>
  <p style="text-align:center; padding: 40px 20px; font-family: sans-serif; color:#241B2E;">Please enable JavaScript to view our interactive menu.</p>
</noscript>

<button id="back-to-top" class="back-to-top" aria-label="Back to top">↑</button>

<footer class="site-footer">
  <p class="footer-brand">Victorious Mega Kitchen</p>
  <p class="footer-note">Benin City · Menu items subject to availability</p>
</footer>

<script>
(function () {
  var CATEGORIES = [
    {
      id: 'rice',
      label: 'Rice',
      tagline: 'Rice bowls & pasta',
      icon: '🍚',
      color: 'coral',
      items: ['Carribean Rice', 'VMK Special Rice', 'Ofada Rice', 'Chicken Fried Rice', 'Goatmeat Basmati Rice', 'Combo Jollof Rice', 'Jollof Rice', 'Fried Rice', 'Chinese Rice', 'White Chinese Rice', 'Leaf Rice', 'Oil Rice', 'Coconut Rice', 'Spaghetti', 'Macaroni', 'Creamy Pasta']
    },
    {
      id: 'swallow',
      label: 'Swallow',
      tagline: 'Swallow, soups & sides to pair',
      icon: '🍲',
      color: 'purple',
      items: ['Pounded Yam', 'Poundo Yam', 'Eba', 'Fufu', 'Semovita', 'Starch', 'Wheat', 'Amala', 'Ofe Owerri', 'Edikanekong', 'Afang', 'Black Soup', 'White Soup', 'Waterleaf Soup', 'Oha Soup', 'Bitterleaf Soup', 'Groundnut Soup', 'Banga Soup', 'Okro Soup', 'Special Okro', 'Owo Fish']
    },
    {
      id: 'extras',
      label: 'Extras',
      tagline: 'Sides, sauces & small chops',
      icon: '🥗',
      color: 'lime',
      items: ['Gizdodo', 'Garden Egg Sauce', 'Egg Sauce', 'Salad', 'Leaf Moimoi', 'Cup Moimoi', 'Groundnut Oil Beans', 'Oil Beans', 'Mixed Rice and Beans', 'Fried Plantain', 'Fried Potatoes', 'Boiled Plantain', 'Yamarita', 'Porridge Yam', 'Boiled Yam', 'Chicken Sauce', 'Goatmeat Sauce', 'Kpomo Sauce', 'Sauce Beef']
    },
    {
      id: 'protein',
      label: 'Protein',
      tagline: 'Meat & fish, made your way',
      icon: '🍗',
      color: 'teal',
      items: ['Turkey Sauce', 'Stew Fish', 'Meluzza Fish', 'Beef (Fried & Sauce)', 'Cow Leg, Head & Tail', 'Kpomo', 'Chicken', 'Chicken Wings', 'Catfish', 'Bushmeat', 'Titus Fish', 'Goat Meat', 'Ofada Stew', 'Eggs']
    }
  ];

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderPills() {
    var wrap = document.getElementById('cat-pills');
    wrap.innerHTML = CATEGORIES.map(function (cat) {
      return '<button type="button" class="cat-pill" data-target="' + cat.id + '">' +
        '<span aria-hidden="true">' + cat.icon + '</span>' +
        '<span>' + esc(cat.label) + '</span>' +
        '<span class="pill-count">' + cat.items.length + '</span>' +
        '</button>';
    }).join('');
  }

  function renderSections() {
    var main = document.getElementById('menu-main');
    main.innerHTML = CATEGORIES.map(function (cat) {
      var itemsHtml = cat.items.map(function (name, i) {
        var safeName = esc(name);
        var lowerName = esc(name.toLowerCase());
        return '<div class="menu-item" data-name="' + lowerName + '" data-original="' + safeName + '" style="--item-color:var(--' + cat.color + ');--delay:' + (i * 25) + 'ms">' +
          '<span class="item-dot" aria-hidden="true"></span>' +
          '<span class="item-name">' + safeName + '</span>' +
          '</div>';
      }).join('');

      return '<section class="menu-section" id="' + cat.id + '">' +
        '<div class="section-head" style="--section-color:var(--' + cat.color + ')">' +
        '<h2><span aria-hidden="true">' + cat.icon + '</span>' + esc(cat.label) + '</h2>' +
        '<p class="section-tagline">' + esc(cat.tagline) + '</p>' +
        '<span class="section-count">' + cat.items.length + ' dishes</span>' +
        '</div>' +
        '<div class="item-grid">' + itemsHtml + '</div>' +
        '</section>';
    }).join('');
  }

  function filterMenu(query) {
    var q = query.trim().toLowerCase();
    var totalVisible = 0;

    document.querySelectorAll('.menu-section').forEach(function (section) {
      var visibleInSection = 0;
      section.querySelectorAll('.menu-item').forEach(function (item) {
        var name = item.dataset.name;
        var original = item.dataset.original;
        var isMatch = q === '' || name.indexOf(q) !== -1;
        item.classList.toggle('is-hidden', !isMatch);
        var label = item.querySelector('.item-name');
        if (isMatch && q) {
          var idx = name.indexOf(q);
          label.innerHTML = esc(original.slice(0, idx)) + '<mark>' + esc(original.slice(idx, idx + q.length)) + '</mark>' + esc(original.slice(idx + q.length));
        } else {
          label.textContent = original;
        }
        if (isMatch) {
          visibleInSection++;
          totalVisible++;
        }
      });
      section.classList.toggle('is-hidden', visibleInSection === 0);
    });

    var emptyState = document.getElementById('empty-state');
    var queryText = emptyState.querySelector('.query-text');
    if (totalVisible === 0) {
      emptyState.hidden = false;
      queryText.textContent = '"' + query.trim() + '"';
    } else {
      emptyState.hidden = true;
    }
  }

  function bindSearch() {
    var searchInput = document.getElementById('menu-search');
    var clearBtn = document.getElementById('clear-search');
    var clearBtn2 = document.getElementById('clear-search-2');

    searchInput.addEventListener('input', function (e) {
      filterMenu(e.target.value);
      clearBtn.hidden = e.target.value.length === 0;
    });

    function doClear() {
      searchInput.value = '';
      filterMenu('');
      clearBtn.hidden = true;
      searchInput.focus();
    }

    clearBtn.addEventListener('click', doClear);
    if (clearBtn2) clearBtn2.addEventListener('click', doClear);
  }

  function bindPillClicks() {
    var searchInput = document.getElementById('menu-search');
    var clearBtn = document.getElementById('clear-search');

    document.querySelectorAll('.cat-pill').forEach(function (pill) {
      pill.addEventListener('click', function () {
        if (searchInput.value) {
          searchInput.value = '';
          filterMenu('');
          clearBtn.hidden = true;
        }
        var target = document.getElementById(pill.dataset.target);
        if (!target) return;
        var stickyZone = document.querySelector('.sticky-zone');
        var offset = stickyZone ? stickyZone.offsetHeight : 0;
        var top = target.getBoundingClientRect().top + window.scrollY - offset - 12;
        window.scrollTo({ top: top, behavior: 'smooth' });
      });
    });
  }

  function setupObserver() {
    var pills = document.querySelectorAll('.cat-pill');
    if (!('IntersectionObserver' in window)) return;
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          pills.forEach(function (p) {
            p.classList.toggle('is-active', p.dataset.target === entry.target.id);
          });
        }
      });
    }, { root: null, rootMargin: '-40% 0px -50% 0px', threshold: 0 });

    document.querySelectorAll('.menu-section').forEach(function (s) {
      observer.observe(s);
    });
  }

  function bindBackToTop() {
    var btn = document.getElementById('back-to-top');
    window.addEventListener('scroll', function () {
      btn.classList.toggle('is-visible', window.scrollY > 480);
    });
    btn.addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    renderPills();
    renderSections();
    bindSearch();
    bindPillClicks();
    setupObserver();
    bindBackToTop();
  });
})();
</script>
</body>
</html>
